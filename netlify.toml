# Playground (root) + Docs (/docs) combined
[build]
  command = "corepack enable && pnpm install && pnpm build && mkdir -p apps/playground/dist/docs && cp -r apps/docs/dist/. apps/playground/dist/docs/"
  publish = "apps/playground/dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
